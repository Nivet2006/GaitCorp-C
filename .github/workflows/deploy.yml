name: CI Build Test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Next.js Build
        run: npm run build

      - name: Update README Build Status Label
        if: success()
        run: |
          sed -i 's/badge\/Build-[a-zA-Z]*-*[a-zA-Z]*/badge\/Build-Passed-success/g' README.md

      - name: Commit and Push README Update
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update build status badge to Passed [skip ci]"
          file_pattern: 'README.md'
